<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#333;padding:20px;max-width:900px;margin:0 auto}
.cal-header{padding:1.5rem 0 1rem}
.cal-title{font-size:22px;font-weight:600;color:#111;margin-bottom:4px}
.cal-sub{font-size:14px;color:#777;line-height:1.6}
.stats-bar{display:flex;gap:16px;margin-bottom:1.25rem;flex-wrap:wrap}
.stat{font-size:13px;color:#666}
.stat strong{color:#111;font-weight:600}
.filter-group{margin-bottom:10px}
.filter-label{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.75rem}
.filter-btn{font-size:12px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;transition:all .15s}
.filter-btn.active{background:#111;color:#fff;border-color:#111}
.filter-btn:hover:not(.active){background:#f5f5f5}
.month-block{margin-bottom:2rem}
.month-label{font-size:12px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.08em;padding:8px 0;border-bottom:1px solid #eee;margin-bottom:.75rem}
.race-item{border:1px solid #eee;border-radius:8px;margin-bottom:6px;overflow:hidden;background:#fff}
.race-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none}
.race-header:hover{background:#fafafa}
.race-status{width:8px;height:8px;border-radius:50%;flex-shrink:0;align-self:flex-start;margin-top:4px}
.status-confirmed{background:#2e7d32}
.status-pending{background:#e65100}
.race-content{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.race-name{font-size:14px;font-weight:500;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.race-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.race-date{font-size:11px;color:#888;white-space:nowrap}
.race-dist{font-size:11px;font-weight:500;padding:1px 7px;border-radius:10px;background:#f0f0f0;color:#555;white-space:nowrap}
.race-loc{font-size:11px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.chevron{width:14px;height:14px;color:#bbb;transition:transform .2s;flex-shrink:0;align-self:flex-start;margin-top:3px}
.chevron.open{transform:rotate(180deg)}
.race-details{padding:0 14px 12px 32px;display:none;grid-template-columns:1fr 1fr;gap:5px}
.race-details.open{display:grid}
.detail-item{font-size:12px;color:#666}
.detail-label{color:#aaa;margin-right:4px}
.detail-links{grid-column:1/-1;display:flex;gap:12px;margin-top:6px;flex-wrap:wrap}
.detail-link{font-size:12px;font-weight:500;color:#1565c0;text-decoration:none;border-bottom:1px solid #bbdefb}
.detail-link:hover{color:#0d47a1}
.guide-badge{font-size:11px;font-weight:500;color:#2e7d32;background:#e8f5e9;padding:2px 8px;border-radius:10px}
.empty-state{text-align:center;padding:3rem 1rem;color:#999;font-size:14px}
.legend{display:flex;gap:16px;margin-bottom:1rem;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#666}
.legend-dot{width:8px;height:8px;border-radius:50%}
</style>
</head>

const months=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const distCats=["5k o menos","10k","Media (21k)","Maratón (42k)","Otras distancias"];

function distCategory(d){
  if(!d||d==="-") return "Otras distancias";
  if(d.includes("42")) return "Maratón (42k)";
  if(d.includes("21")) return "Media (21k)";
  const nums=d.match(/[\d,]+/g)||[];
  const vals=nums.map(n=>parseFloat(n.replace(",",".")));
  if(vals.some(v=>v>=10&&v<21)) return "10k";
  if(vals.length&&vals.every(v=>v<10)) return "5k o menos";
  return "Otras distancias";
}

let activeMonth="Todos", activeDist="Todos";

function render(){
  const list=document.getElementById("race-list");
  const filtered=races.filter(r=>{
    const mOk=activeMonth==="Todos"||r.month===activeMonth;
    const dOk=activeDist==="Todos"||distCategory(r.dist)===activeDist;
    return mOk&&dOk;
  });
  const confirmed=filtered.filter(r=>r.confirmed).length;
  const pending=filtered.filter(r=>!r.confirmed).length;
  document.getElementById("stat-total").innerHTML=`<strong>${filtered.length}</strong> carreras`;
  document.getElementById("stat-confirmed").innerHTML=`<strong style="color:#2e7d32">${confirmed}</strong> confirmadas`;
  document.getElementById("stat-pending").innerHTML=`<strong style="color:#e65100">${pending}</strong> pendientes`;
  if(!filtered.length){list.innerHTML='<div class="empty-state">Ninguna carrera con estos filtros</div>';return;}
  const byMonth={};
  filtered.forEach(r=>{if(!byMonth[r.month])byMonth[r.month]=[];byMonth[r.month].push(r);});
  list.innerHTML=Object.entries(byMonth).map(([m,rs])=>`
    <div class="month-block">
      <div class="month-label">${m} · ${rs.length} carrera${rs.length!==1?"s":""}</div>
      ${rs.map((r,i)=>{
        const id=`r${m.slice(0,3)}${i}`;
        return `<div class="race-item">
          <div class="race-header" onclick="toggle('${id}')">
            <div class="race-status ${r.confirmed?'status-confirmed':'status-pending'}"></div>
            <div class="race-content">
              <div class="race-name">${r.name}</div>
              <div class="race-meta">
                <span class="race-loc">${r.loc}</span>
                <span class="race-date">${r.date}</span>
                <span class="race-dist">${r.dist}</span>
              </div>
            </div>
            <svg class="chevron" id="chev${id}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4 4 4-4"/></svg>
          </div>
          <div class="race-details" id="${id}">
            <div class="detail-item"><span class="detail-label">Terreno</span>${r.terrain}</div>
            <div class="detail-item"><span class="detail-label">Homologada</span>${r.certified?"Sí":"No"}</div>
            <div class="detail-item"><span class="detail-label">Estado</span>${r.confirmed?"Confirmada":"Pendiente"}</div>
            <div class="detail-links">
              ${r.web?`<a class="detail-link" href="${r.web}" target="_blank" rel="noopener">Web oficial</a>`:""}
              ${r.guideUrl?`<a class="detail-link" href="${r.guideUrl}" target="_blank" rel="noopener">Guía del recorrido ↗</a>`:r.guide?`<span class="guide-badge">Guía en el blog</span>`:""}
            </div>
          </div>
        </div>`;
      }).join("")}
    </div>
  `).join("");
}

function toggle(id){
  const el=document.getElementById(id);
  const chev=document.getElementById("chev"+id);
  const open=el.style.display==="grid";
  el.style.display=open?"none":"grid";
  chev.classList.toggle("open",!open);
}

function buildFilters(){
  document.getElementById("month-filters").innerHTML=["Todos",...months].map(m=>`<button class="filter-btn${m==="Todos"?" active":""}" onclick="setMonth('${m}')">${m}</button>`).join("");
  document.getElementById("dist-filters").innerHTML=["Todos",...distCats].map(d=>`<button class="filter-btn${d==="Todos"?" active":""}" onclick="setDist('${d}')">${d}</button>`).join("");
}
function setMonth(m){activeMonth=m;document.querySelectorAll("#month-filters .filter-btn").forEach(b=>b.classList.toggle("active",b.textContent===m));render();}
function setDist(d){activeDist=d;document.querySelectorAll("#dist-filters .filter-btn").forEach(b=>b.classList.toggle("active",b.textContent===d));render();}

buildFilters();render();
</script>
</body>
</html>
